<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>박스비트 · CrossFit Rhythm</title>
<style>
  :root{
    --bg:#07101b;
    --card:rgba(17,27,44,.94);
    --card2:rgba(23,37,59,.95);
    --line:rgba(255,255,255,.08);
    --text:#eef4ff;
    --muted:#93a4c2;
    --gold:#f7bf4f;
    --orange:#ff8a3d;
    --green:#49d59a;
    --blue:#6ea6ff;
    --red:#ff6a80;
    --shadow:0 24px 80px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none}
  html,body{margin:0;min-height:100%;background:radial-gradient(circle at top, rgba(110,166,255,.18), transparent 25%), radial-gradient(circle at bottom, rgba(255,138,61,.12), transparent 25%), linear-gradient(180deg,var(--bg),#050b13);color:var(--text);font-family:Inter, Pretendard, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;overscroll-behavior:none}
  button{font:inherit;cursor:pointer}
  .app{max-width:480px;margin:0 auto;min-height:100vh;padding:16px 14px 24px;display:flex;flex-direction:column}
  .hidden{display:none !important}
  .brand-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .brand{font-weight:900;font-size:26px;line-height:1;background:linear-gradient(135deg,#fff0c6,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .brand-sub{margin-top:4px;color:var(--muted);font-size:11px}
  .lvl-chip{padding:8px 12px;border-radius:999px;background:rgba(110,166,255,.13);border:1px solid rgba(110,166,255,.25);color:#cfe1ff;font-weight:800;font-size:12px;white-space:nowrap}

  /* ---- menu ---- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 10px 36px rgba(0,0,0,.14)}
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .panel-head h3{margin:0;font-size:16px}
  .hint{font-size:11px;color:var(--muted)}
  .how{display:flex;flex-direction:column;gap:8px;font-size:12px;color:#d9e5f8}
  .how b{color:var(--gold)}
  .legend{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
  .legend-item{border:1px solid var(--line);border-radius:14px;padding:10px 4px;text-align:center;background:rgba(255,255,255,.03)}
  .legend-item .emo{font-size:22px}
  .legend-item .nm{font-size:10px;color:var(--muted);margin-top:4px}
  .song-list{display:flex;flex-direction:column;gap:10px}
  .song-card{border:1px solid var(--line);background:var(--card2);border-radius:18px;padding:14px;display:flex;align-items:center;gap:12px}
  .song-info{flex:1;min-width:0}
  .song-info strong{display:block;font-size:15px}
  .song-info p{margin:4px 0 0;color:var(--muted);font-size:12px}
  .stars{color:var(--gold);font-size:12px;letter-spacing:1px}
  .best{font-size:11px;color:var(--green);margin-top:2px}
  .play-btn{border:none;border-radius:14px;padding:12px 16px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));color:#1c1200;flex-shrink:0}

  /* ---- play ---- */
  .hud{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
  .hud-left strong{font-size:15px;display:block}
  .hud-left span{font-size:11px;color:var(--muted)}
  .hud-right{text-align:right}
  .score{font-size:22px;font-weight:900}
  .combo{font-size:12px;color:var(--gold);font-weight:800;min-height:14px}
  .hp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .hp-row span{font-size:10px;color:var(--muted);width:24px}
  .hp-bar{flex:1;height:8px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
  .hp-bar>div{height:100%;width:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));border-radius:inherit;transition:width .2s ease}
  .progress-bar{height:5px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:12px}
  .progress-bar>div{height:100%;width:0;background:var(--blue);border-radius:inherit}

  .stage-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid var(--line);margin-bottom:10px}
  .stage-banner .move-now{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px}
  .stage-banner .move-now .emo{font-size:22px}
  .stage-banner .rep-count{font-size:13px;color:var(--gold);font-weight:800}

  .game-stage{position:relative;height:min(58vh,460px);border-radius:22px;background:radial-gradient(ellipse at 50% 82%, rgba(110,166,255,.14), transparent 60%), linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.22));border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}
  .char-svg{width:100%;height:100%}
  .judge-pop{position:absolute;left:0;right:0;top:14px;text-align:center;font-size:20px;font-weight:900;opacity:0;pointer-events:none;transition:opacity .12s ease, transform .12s ease;transform:translateY(6px)}
  .judge-pop.show{opacity:1;transform:translateY(-6px)}
  .judge-pop.PERFECT{color:var(--gold)} .judge-pop.GREAT{color:var(--green)} .judge-pop.GOOD{color:var(--blue)} .judge-pop.MISS{color:var(--red)}
  .combo-big{position:absolute;top:46px;left:0;right:0;text-align:center;font-size:14px;font-weight:900;color:#fff;opacity:.85;pointer-events:none}
  .tap-hint{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:11px;color:var(--muted);pointer-events:none}
  .stage-flash{position:absolute;inset:0;background:rgba(255,255,255,.12);opacity:0;pointer-events:none;transition:opacity .1s ease}
  .stage-flash.on{opacity:1}

  .tap-big{width:100%;margin-top:12px;border:none;border-radius:20px;padding:20px;font-weight:900;font-size:16px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#1c1200;letter-spacing:1px}
  .tap-big:active{transform:scale(.98)}

  .play-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:10px 14px;font-size:12px}

  /* ---- result ---- */
  .result-rank{text-align:center;font-size:64px;font-weight:900;line-height:1;margin:10px 0 4px;background:linear-gradient(135deg,#fff0c6,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .result-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px}
  .result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .result-mini{border:1px solid var(--line);background:var(--card2);border-radius:16px;padding:12px;text-align:center}
  .result-mini strong{display:block;font-size:20px}
  .result-mini span{font-size:11px;color:var(--muted)}
  .judge-breakdown{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .jb-row{display:flex;justify-content:space-between;font-size:13px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04)}
  .result-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .primary{border:none;border-radius:14px;padding:14px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));color:#1c1200}
  .secondary{border:1px solid var(--line);border-radius:14px;padding:14px;font-weight:800;background:rgba(255,255,255,.06);color:var(--text)}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="brand-row">
    <div>
      <div class="brand">박스비트</div>
      <div class="brand-sub">크로스핏 동작 리듬게임</div>
    </div>
    <div class="lvl-chip" id="levelChip">LV 1</div>
  </div>

  <!-- ===== MENU SCREEN ===== -->
  <section id="screen-menu">
    <div class="panel">
      <div class="panel-head"><h3>플레이 방법</h3><span class="hint">탭 타이밍</span></div>
      <div class="how">
        <p>캐릭터가 박자에 맞춰 실제 동작 자세로 반복 수행해. <b>가장 낮은 자세(바닥)에 닿는 순간</b> 화면을 탭하거나 스페이스바를 눌러줘.</p>
        <p>WOD는 여러 동작을 이어붙인 구성이라, <b>한 번에 한 동작씩</b> 순서대로 등장해.</p>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h3>WOD 트랙 선택</h3><span class="hint">난이도 순</span></div>
      <div class="song-list" id="songList"></div>
    </div>
  </section>

  <!-- ===== PLAY SCREEN ===== -->
  <section id="screen-play" class="hidden">
    <div class="hud">
      <div class="hud-left">
        <strong id="playSongName">-</strong>
        <span id="playSongMeta">-</span>
      </div>
      <div class="hud-right">
        <div class="score" id="playScore">0</div>
        <div class="combo" id="playCombo"></div>
      </div>
    </div>
    <div class="hp-row"><span>HP</span><div class="hp-bar"><div id="hpFill"></div></div></div>
    <div class="progress-bar"><div id="progressFill"></div></div>

    <div class="stage-banner">
      <div class="move-now"><span class="emo" id="moveEmo">🦵</span><span id="moveName">-</span></div>
      <div class="rep-count" id="repCount">0/0</div>
    </div>

    <div class="game-stage" id="gameStage">
      <div class="stage-flash" id="stageFlash"></div>
      <div class="combo-big hidden" id="comboBig"></div>
      <div class="judge-pop" id="judgePop"></div>
      <svg class="char-svg" id="charSvg" viewBox="0 24 280 322" preserveAspectRatio="xMidYMid meet">
        <defs>
          <!-- gradientUnits="userSpaceOnUse"로 고정: 캐릭터 각 부위가 회전/수평/수직이 되어도
               objectBoundingBox 그라디언트가 깨지지 않고, 하나의 광원 방향이 항상 유지됨 -->
          <linearGradient id="gradSkin" gradientUnits="userSpaceOnUse" x1="70" y1="60" x2="230" y2="340">
            <stop offset="0%" stop-color="#ffe3bd"/>
            <stop offset="100%" stop-color="#e8a86c"/>
          </linearGradient>
          <linearGradient id="gradShorts" gradientUnits="userSpaceOnUse" x1="70" y1="60" x2="230" y2="340">
            <stop offset="0%" stop-color="#3f4864"/>
            <stop offset="100%" stop-color="#171d2e"/>
          </linearGradient>
          <linearGradient id="gradShirt" gradientUnits="userSpaceOnUse" x1="70" y1="60" x2="230" y2="340">
            <stop id="shirtStop0" offset="0%" stop-color="#8fbaff"/>
            <stop id="shirtStop1" offset="100%" stop-color="#3a6bd4"/>
          </linearGradient>
          <linearGradient id="gradShoe" gradientUnits="userSpaceOnUse" x1="70" y1="60" x2="230" y2="340">
            <stop offset="0%" stop-color="#333c52"/>
            <stop offset="100%" stop-color="#11151f"/>
          </linearGradient>
          <linearGradient id="gradBox" gradientUnits="userSpaceOnUse" x1="96" y1="280" x2="204" y2="340">
            <stop offset="0%" stop-color="#4a5674"/>
            <stop offset="100%" stop-color="#232c40"/>
          </linearGradient>
        </defs>
        <ellipse id="groundShadow" cx="150" cy="326" rx="52" ry="10" fill="rgba(0,0,0,.4)"/>
        <rect id="boxPlatform" x="96" y="280" width="108" height="60" rx="8" fill="url(#gradBox)" stroke="rgba(255,255,255,.12)" opacity="0"/>
        <g id="figure" stroke-linecap="round" fill="none">
          <line id="legBackThigh" stroke="url(#gradShorts)" stroke-width="26" opacity=".6"/>
          <line id="legBackShin" stroke="url(#gradSkin)" stroke-width="18" opacity=".6"/>
          <ellipse id="legBackShoe" rx="15" ry="8" fill="url(#gradShoe)" opacity=".6"/>
          <line id="armBackUpper" stroke="url(#gradShirt)" stroke-width="15" opacity=".75"/>
          <line id="armBackFore" stroke="url(#gradSkin)" stroke-width="13" opacity=".75"/>
          <line id="torsoLine" stroke="url(#gradShirt)" stroke-width="34"/>
          <line id="legFrontThigh" stroke="url(#gradShorts)" stroke-width="27"/>
          <line id="legFrontShin" stroke="url(#gradSkin)" stroke-width="19"/>
          <ellipse id="legFrontShoe" rx="17" ry="9" fill="url(#gradShoe)"/>
          <circle id="headCircle" r="24" fill="url(#gradSkin)"/>
          <circle id="headShine" r="6" fill="rgba(255,255,255,.4)"/>
          <line id="armFrontUpper" stroke="url(#gradShirt)" stroke-width="16"/>
          <line id="armFrontFore" stroke="url(#gradSkin)" stroke-width="14"/>
        </g>
      </svg>
      <div class="tap-hint">화면을 탭해도 판정돼</div>
    </div>

    <button class="tap-big" id="tapBig">TAP · SPACE</button>

    <div class="play-footer">
      <button class="ghost" id="pauseBtn">일시정지</button>
      <button class="ghost" id="exitBtn">그만하기</button>
    </div>
  </section>

  <!-- ===== RESULT SCREEN ===== -->
  <section id="screen-result" class="hidden">
    <div class="panel">
      <div class="result-rank" id="resultRank">S</div>
      <div class="result-sub" id="resultSub">-</div>
      <div class="result-grid">
        <div class="result-mini"><strong id="resultScore">0</strong><span>SCORE</span></div>
        <div class="result-mini"><strong id="resultCombo">0</strong><span>MAX COMBO</span></div>
      </div>
      <div class="judge-breakdown" id="judgeBreakdown"></div>
      <div class="result-mini" style="margin-bottom:16px">
        <strong id="resultXp">+0 XP</strong>
        <span>획득 경험치</span>
      </div>
      <div class="result-actions">
        <button class="secondary" id="retryBtn">다시하기</button>
        <button class="primary" id="menuBtn">트랙 선택</button>
      </div>
    </div>
  </section>

</div>

<script>
/* ============== 데이터 ============== */
const MOVES = {
  squat:   { name:'스쿼트',   emoji:'🦵', color0:'#8fbaff', color1:'#3a6bd4' },
  burpee:  { name:'버피',     emoji:'🔥', color0:'#ffab6b', color1:'#c85a1f' },
  boxjump: { name:'박스점프', emoji:'⬆️', color0:'#6be0ac', color1:'#1f9d6b' },
  snatch:  { name:'스내치',   emoji:'🏋️', color0:'#ffd685', color1:'#d69420' },
};

const WODS = [
  {
    id:'squat-basics', name:'스쿼트 베이직', bpm:100, stars:1,
    stations:[ {move:'squat', reps:30} ]
  },
  {
    id:'fran-style', name:'프란 스타일 12-9-6', bpm:126, stars:2,
    stations:[
      {move:'squat',reps:12}, {move:'burpee',reps:12},
      {move:'squat',reps:9},  {move:'burpee',reps:9},
      {move:'squat',reps:6},  {move:'burpee',reps:6},
    ]
  },
  {
    id:'grace-rush', name:'그레이스 러쉬', bpm:148, stars:3,
    stations:[
      {move:'boxjump',reps:12}, {move:'snatch',reps:12},
      {move:'boxjump',reps:12}, {move:'snatch',reps:12},
      {move:'boxjump',reps:6},  {move:'snatch',reps:6},
    ]
  },
  {
    id:'murph-overdrive', name:'머프 오버드라이브', bpm:168, stars:4,
    stations:[
      {move:'squat',reps:10}, {move:'burpee',reps:10}, {move:'boxjump',reps:10}, {move:'snatch',reps:10},
      {move:'squat',reps:7},  {move:'burpee',reps:7},  {move:'boxjump',reps:7},  {move:'snatch',reps:7},
    ]
  },
];

const PERFECT_WINDOW = 0.07;
const GOOD_WINDOW = 0.18;
const MISS_WINDOW = 0.22;

const META_KEY = 'boxbeat-meta-v2';
function loadMeta(){
  try{ const s = JSON.parse(localStorage.getItem(META_KEY)); if(s) return s; }catch(e){}
  return { totalXp:0, best:{} };
}
function saveMeta(){ localStorage.setItem(META_KEY, JSON.stringify(meta)); }
const meta = loadMeta();
function levelFromXp(xp){ return Math.floor(xp/500)+1; }

/* ============== 오디오 ============== */
const Audio = {
  ctx:null,
  init(){
    if(!this.ctx || this.ctx.state === 'closed'){
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(this.ctx.state === 'suspended') this.ctx.resume();
  },
  now(){ return this.ctx.currentTime; },
  close(){ if(this.ctx && this.ctx.state !== 'closed'){ try{ this.ctx.close(); }catch(e){} } this.ctx = null; },
  tone(time, freq, dur, type='sine', vol=.18){
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(vol, time+0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, time+dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(time); osc.stop(time+dur+0.02);
  },
  noise(time, dur, vol, filterFreq, filterType='highpass'){
    const ctx = this.ctx;
    const bufSize = Math.max(1, Math.floor(ctx.sampleRate*dur));
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1)*(1-i/bufSize);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = filterType; filt.frequency.value = filterFreq;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(vol, time);
    gain.gain.exponentialRampToValueAtTime(0.0001, time+dur);
    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start(time); src.stop(time+dur+0.02);
  },
  kick(time){
    const ctx = this.ctx;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(45, time+0.12);
    gain.gain.setValueAtTime(0.5, time);
    gain.gain.exponentialRampToValueAtTime(0.0001, time+0.16);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(time); osc.stop(time+0.2);
  },
  hihat(time){ this.noise(time, 0.05, 0.06, 7000); },
  snare(time){ this.noise(time, 0.12, 0.22, 1800, 'bandpass'); },
  hitSound(grade){
    const vol = grade === 'PERFECT' ? .22 : .14;
    const freq = grade === 'PERFECT' ? 587 : 440;
    this.tone(this.now(), freq, grade === 'PERFECT' ? 0.16 : 0.1, 'triangle', vol);
  },
  missSound(){ this.noise(this.now(), 0.1, 0.12, 300, 'lowpass'); },
};

function scheduleBeat(startTime, bpm, durationSec){
  const eighth = 60/bpm/2;
  const totalEighths = Math.round(durationSec/eighth);
  for(let i=0;i<totalEighths;i++){
    const t = startTime + i*eighth;
    if(i % 2 === 0) Audio.kick(t);
    Audio.hihat(t);
    const beatIndex = Math.floor(i/2) % 4;
    if(i % 2 === 0 && (beatIndex === 1 || beatIndex === 3)) Audio.snare(t);
  }
}

/* ============== WOD 채보 생성 ============== */
function buildChart(wod){
  const beatDur = 60/wod.bpm;
  const repDur = beatDur*2;
  let t = 0;
  const reps = [];
  wod.stations.forEach((st, si) => {
    for(let r=0; r<st.reps; r++){
      reps.push({
        move: st.move, station: si, repIndexInStation: r, stationReps: st.reps,
        repStart: t, repDur, time: t + repDur*0.5, judged:false,
      });
      t += repDur;
    }
  });
  return { reps, duration: t };
}

/* ============== 캐릭터 리그 (관절 기반 옆모습) ============== */
const RIG = { footX:150, groundY:320, thigh:54, shin:54, torso:76, upperArm:42, foreArm:38, headR:24, boxDrop:46 };
const REST = { thigh:0, shin:0, torso:0, armA:0, armAElbow:0, armB:0, armBElbow:0, airborne:0, box:0 };

const MOVE_FRAMES = {
  squat: [
    { p:0.00, ...REST },
    { p:0.50, thigh:-90, shin:14, torso:20, armA:92, armB:92, armAElbow:0, armBElbow:0 },
    { p:1.00, ...REST },
  ],
  burpee: [
    { p:0.00, ...REST },
    { p:0.45, thigh:-76, shin:-84, torso:80, armA:64, armB:56, armAElbow:-18, armBElbow:-18 },
    { p:0.72, thigh:0, shin:0, torso:0, armA:172, armB:164, airborne:-28 },
    { p:1.00, ...REST },
  ],
  boxjump: [
    { p:0.00, ...REST, armA:-22, armB:-22 },
    { p:0.42, thigh:-48, shin:28, torso:16, armA:-42, armB:-42 },
    { p:0.72, thigh:0, shin:0, torso:0, armA:52, armB:44, airborne:-46, box:1 },
    { p:1.00, ...REST, box:0 },
  ],
  snatch: [
    { p:0.00, ...REST },
    { p:0.50, thigh:-18, shin:6, torso:42, armA:10, armB:-8 },
    { p:0.80, thigh:0, shin:0, torso:-6, armA:172, armB:16, airborne:-4 },
    { p:1.00, ...REST },
  ],
};

function interpFrames(frames, p){
  p = Math.min(Math.max(p,0),1);
  for(let i=0;i<frames.length-1;i++){
    const A = frames[i], B = frames[i+1];
    if(p >= A.p && p <= B.p){
      const t = (B.p - A.p) > 0 ? (p - A.p)/(B.p - A.p) : 0;
      const out = {};
      Object.keys(REST).forEach(k => { out[k] = (A[k]??REST[k]) + ((B[k]??REST[k]) - (A[k]??REST[k]))*t; });
      return out;
    }
  }
  return frames[frames.length-1];
}

function poseFor(move, progress){
  const frames = MOVE_FRAMES[move] || MOVE_FRAMES.squat;
  const params = interpFrames(frames, progress);
  const depth = Math.sin(Math.min(Math.max(progress,0),1) * Math.PI);
  return { ...params, depth };
}

function toRad(d){ return d*Math.PI/180; }
function setLine(id, x1,y1,x2,y2){ const el = document.getElementById(id); el.setAttribute('x1',x1); el.setAttribute('y1',y1); el.setAttribute('x2',x2); el.setAttribute('y2',y2); }
function setEllipse(id, cx,cy){ const el = document.getElementById(id); el.setAttribute('cx',cx); el.setAttribute('cy',cy); }

function drawCharacter(pose){
  const R = RIG;
  const air = pose.airborne || 0;
  const gY = R.groundY + air;

  // 다리: 발(고정) -> 무릎 -> 엉덩이 순서로 계산
  const shinW = pose.shin;
  const kneeX = R.footX + R.shin*Math.sin(toRad(shinW));
  const kneeY = gY - R.shin*Math.cos(toRad(shinW));
  const thighW = pose.thigh;
  const hipX = kneeX + R.thigh*Math.sin(toRad(thighW));
  const hipY = kneeY - R.thigh*Math.cos(toRad(thighW));

  // 몸통: 엉덩이 -> 어깨
  const shoulderX = hipX + R.torso*Math.sin(toRad(pose.torso));
  const shoulderY = hipY - R.torso*Math.cos(toRad(pose.torso));

  // 머리
  const headDist = R.headR + 8;
  const headCX = shoulderX + headDist*Math.sin(toRad(pose.torso));
  const headCY = shoulderY - headDist*Math.cos(toRad(pose.torso));

  // 팔 A(앞) / B(뒤): 어깨 -> 팔꿈치 -> 손
  function armPoints(worldA, elbowRel){
    const elbowX = shoulderX + R.upperArm*Math.sin(toRad(worldA));
    const elbowY = shoulderY + R.upperArm*Math.cos(toRad(worldA));
    const foreW = worldA + elbowRel;
    const handX = elbowX + R.foreArm*Math.sin(toRad(foreW));
    const handY = elbowY + R.foreArm*Math.cos(toRad(foreW));
    return { elbowX, elbowY, handX, handY };
  }
  const armA = armPoints(pose.armA, pose.armAElbow);
  const armB = armPoints(pose.armB, pose.armBElbow);

  const backOffset = 10;
  const shinDir = Math.sin(toRad(shinW));
  setLine('legBackThigh', hipX-backOffset, hipY, kneeX-backOffset, kneeY);
  setLine('legBackShin', kneeX-backOffset, kneeY, R.footX-backOffset, gY);
  setEllipse('legBackShoe', R.footX-backOffset+shinDir*10, gY+2);

  setLine('legFrontThigh', hipX+backOffset*0.4, hipY, kneeX+backOffset*0.4, kneeY);
  setLine('legFrontShin', kneeX+backOffset*0.4, kneeY, R.footX+backOffset*0.4, gY);
  setEllipse('legFrontShoe', R.footX+backOffset*0.4+shinDir*12, gY+2);

  setLine('torsoLine', hipX, hipY, shoulderX, shoulderY);

  setLine('armBackUpper', shoulderX, shoulderY, armB.elbowX, armB.elbowY);
  setLine('armBackFore', armB.elbowX, armB.elbowY, armB.handX, armB.handY);
  setLine('armFrontUpper', shoulderX, shoulderY, armA.elbowX, armA.elbowY);
  setLine('armFrontFore', armA.elbowX, armA.elbowY, armA.handX, armA.handY);

  const head = document.getElementById('headCircle');
  head.setAttribute('cx', headCX); head.setAttribute('cy', headCY);
  const shine = document.getElementById('headShine');
  shine.setAttribute('cx', headCX-8); shine.setAttribute('cy', headCY-9);

  const shadow = document.getElementById('groundShadow');
  const shrink = Math.min(1, Math.abs(air)/50);
  shadow.setAttribute('cx', R.footX);
  shadow.setAttribute('rx', 52*(1-shrink*0.55));
  shadow.setAttribute('opacity', 0.4 - shrink*0.28);

  const box = document.getElementById('boxPlatform');
  box.setAttribute('opacity', pose.box || 0);
  box.setAttribute('x', R.footX - 54);
  box.setAttribute('y', R.groundY - R.boxDrop);
  box.setAttribute('width', 108);
  box.setAttribute('height', R.boxDrop + 20);
}

function setTorsoColor(move){
  const def = MOVES[move] || MOVES.squat;
  document.getElementById('shirtStop0').setAttribute('stop-color', def.color0);
  document.getElementById('shirtStop1').setAttribute('stop-color', def.color1);
}

/* ============== 상태 ============== */
let game = null;
let rafId = null;

function startSong(wod){
  Audio.init();
  const chart = buildChart(wod);
  const startTime = Audio.now() + 0.6;
  scheduleBeat(startTime, wod.bpm, chart.duration);

  game = {
    wod, chart, startTime,
    nextIndex:0,
    curStation:-1, curStationReps:0,
    score:0, combo:0, maxCombo:0, hp:100,
    counts:{PERFECT:0, GOOD:0, MISS:0},
    finished:false, failed:false, paused:false,
    allDoneAt:null,
  };

  document.getElementById('playSongName').textContent = wod.name;
  document.getElementById('playSongMeta').textContent = `BPM ${wod.bpm} · ${'★'.repeat(wod.stars)}${'☆'.repeat(4-wod.stars)}`;
  updateHud();
  const first = game.chart.reps[0];
  updateMoveBanner(first ? first.move : 'squat', 0, first ? first.stationReps : 0);
  drawCharacter(poseFor(first ? first.move : 'squat', 0));
  showScreen('play');
  loop();
}

function loop(){
  rafId = requestAnimationFrame(loop);
  if(!game || game.finished) return;
  if(game.paused){ return; }
  const elapsed = Audio.now() - game.startTime;

  while(game.nextIndex < game.chart.reps.length && elapsed - game.chart.reps[game.nextIndex].time > MISS_WINDOW){
    judgeRep(game.chart.reps[game.nextIndex], 'MISS');
    game.nextIndex++;
  }

  const rep = game.chart.reps[game.nextIndex];
  if(rep){
    const progress = (elapsed - rep.repStart) / rep.repDur;
    drawCharacter(poseFor(rep.move, progress));
    if(game.curStation !== rep.station){
      updateMoveBanner(rep.move, rep.repIndexInStation, rep.stationReps);
    } else {
      document.getElementById('repCount').textContent = `${rep.repIndexInStation+1}/${rep.stationReps}`;
    }
  } else {
    drawCharacter(poseFor('squat', 0));
  }

  document.getElementById('progressFill').style.width = `${Math.min(100, elapsed/game.chart.duration*100)}%`;

  if(game.nextIndex >= game.chart.reps.length){
    if(game.allDoneAt === null) game.allDoneAt = elapsed;
    if(elapsed - game.allDoneAt > 0.5) finishSong();
  }
}

function attemptHit(){
  if(!game || game.finished || game.paused) return;
  flashStage();
  const elapsed = Audio.now() - game.startTime;
  const rep = game.chart.reps[game.nextIndex];
  if(!rep) return;
  const diff = Math.abs(rep.time - elapsed);
  if(diff <= GOOD_WINDOW){
    const grade = diff <= PERFECT_WINDOW ? 'PERFECT' : 'GOOD';
    judgeRep(rep, grade);
    game.nextIndex++;
  }
}

function judgeRep(rep, grade){
  rep.judged = true;
  if(game.curStation !== rep.station){
    game.curStation = rep.station;
    game.curStationReps = 0;
  }
  game.curStationReps++;

  game.counts[grade] = (game.counts[grade]||0) + 1;
  if(grade === 'MISS'){
    game.combo = 0;
    game.hp = Math.max(0, game.hp - 8);
    Audio.missSound();
  } else {
    game.combo++;
    game.maxCombo = Math.max(game.maxCombo, game.combo);
    game.hp = Math.min(100, game.hp + (grade==='PERFECT' ? 1 : 0));
    const base = grade === 'PERFECT' ? 300 : 100;
    game.score += base + game.combo*2;
    Audio.hitSound(grade);
  }
  showJudgePop(grade);
  updateHud();
  document.getElementById('repCount').textContent = `${game.curStationReps}/${rep.stationReps}`;
  if(game.hp <= 0) failSong();
}

function flashStage(){
  const el = document.getElementById('stageFlash');
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'), 90);
}

function updateMoveBanner(move, repIndexInStation, stationReps){
  const def = MOVES[move];
  document.getElementById('moveEmo').textContent = def.emoji;
  document.getElementById('moveName').textContent = def.name;
  document.getElementById('repCount').textContent = `${repIndexInStation+1}/${stationReps}`;
  setTorsoColor(move);
}

function showJudgePop(grade){
  const el = document.getElementById('judgePop');
  el.textContent = grade;
  el.className = `judge-pop show ${grade}`;
  clearTimeout(showJudgePop._t);
  showJudgePop._t = setTimeout(()=> el.classList.remove('show'), 260);

  const cb = document.getElementById('comboBig');
  if(game.combo >= 5){
    cb.textContent = `${game.combo} COMBO`;
    cb.classList.remove('hidden');
  } else {
    cb.classList.add('hidden');
  }
}

function updateHud(){
  document.getElementById('playScore').textContent = game.score;
  document.getElementById('playCombo').textContent = game.combo > 0 ? `${game.combo} COMBO` : '';
  document.getElementById('hpFill').style.width = `${game.hp}%`;
}

function failSong(){
  game.failed = true;
  finishSong();
}

function finishSong(){
  if(game.finished) return;
  game.finished = true;
  cancelAnimationFrame(rafId);
  Audio.close();

  const total = game.counts.PERFECT + game.counts.GOOD + game.counts.MISS;
  const maxScorePer = 300;
  const earned = game.counts.PERFECT*300 + game.counts.GOOD*100;
  const acc = total ? earned / (total*maxScorePer) * 100 : 0;

  let rank = 'D';
  if(game.failed) rank = 'F';
  else if(acc >= 95) rank = 'S';
  else if(acc >= 88) rank = 'A';
  else if(acc >= 75) rank = 'B';
  else if(acc >= 60) rank = 'C';

  const xpGained = Math.max(10, Math.round(game.score/50));
  meta.totalXp += xpGained;
  const key = game.wod.id;
  const prevBest = meta.best[key];
  if(!prevBest || game.score > prevBest.score){
    meta.best[key] = { score:game.score, rank };
  }
  saveMeta();

  document.getElementById('resultRank').textContent = rank;
  document.getElementById('resultSub').textContent = game.failed
    ? `${game.wod.name} · 실패 (HP 소진)`
    : `${game.wod.name} · 정확도 ${acc.toFixed(1)}%`;
  document.getElementById('resultScore').textContent = game.score;
  document.getElementById('resultCombo').textContent = game.maxCombo;
  document.getElementById('resultXp').textContent = `+${xpGained} XP`;
  document.getElementById('judgeBreakdown').innerHTML = `
    <div class="jb-row"><span>PERFECT</span><strong>${game.counts.PERFECT||0}</strong></div>
    <div class="jb-row"><span>GOOD</span><strong>${game.counts.GOOD||0}</strong></div>
    <div class="jb-row"><span>MISS</span><strong>${game.counts.MISS||0}</strong></div>
  `;

  renderLevelChip();
  showScreen('result');
}

/* ============== 화면 전환 / 렌더 ============== */
function showScreen(name){
  document.getElementById('screen-menu').classList.toggle('hidden', name !== 'menu');
  document.getElementById('screen-play').classList.toggle('hidden', name !== 'play');
  document.getElementById('screen-result').classList.toggle('hidden', name !== 'result');
}

function renderLevelChip(){
  document.getElementById('levelChip').textContent = `LV ${levelFromXp(meta.totalXp)}`;
}

function renderLegend(){
  document.getElementById('legend').innerHTML = Object.values(MOVES).map(m => `
    <div class="legend-item">
      <div class="emo">${m.emoji}</div>
      <div class="nm">${m.name}</div>
    </div>`).join('');
}

function renderSongList(){
  document.getElementById('songList').innerHTML = WODS.map(w => {
    const best = meta.best[w.id];
    const totalReps = w.stations.reduce((a,s)=>a+s.reps,0);
    const moveNames = [...new Set(w.stations.map(s=>MOVES[s.move].name))].join(' · ');
    return `
    <div class="song-card">
      <div class="song-info">
        <strong>${w.name}</strong>
        <p>BPM ${w.bpm} · 총 ${totalReps}회 · ${moveNames}</p>
        <div class="stars">${'★'.repeat(w.stars)}${'☆'.repeat(4-w.stars)}</div>
        ${best ? `<div class="best">BEST ${best.score} · RANK ${best.rank}</div>` : ''}
      </div>
      <button class="play-btn" data-song="${w.id}">PLAY</button>
    </div>`;
  }).join('');
  document.querySelectorAll('[data-song]').forEach(btn => {
    btn.onclick = () => {
      const wod = WODS.find(w => w.id === btn.dataset.song);
      startSong(wod);
    };
  });
}

/* ============== 이벤트 ============== */
document.addEventListener('keydown', e => {
  if(e.repeat) return;
  if(e.key !== ' ' && e.key !== 'Enter') return;
  if(document.getElementById('screen-play').classList.contains('hidden')) return;
  e.preventDefault();
  attemptHit();
});

document.getElementById('gameStage').addEventListener('pointerdown', () => attemptHit());
document.getElementById('tapBig').addEventListener('pointerdown', e => { e.preventDefault(); attemptHit(); });

document.getElementById('pauseBtn').addEventListener('click', () => {
  if(!game || game.finished) return;
  game.paused = !game.paused;
  document.getElementById('pauseBtn').textContent = game.paused ? '계속하기' : '일시정지';
  if(game.paused) Audio.ctx.suspend(); else Audio.ctx.resume();
});

document.getElementById('exitBtn').addEventListener('click', () => {
  if(!game) return;
  cancelAnimationFrame(rafId);
  Audio.close();
  game = null;
  showScreen('menu');
});

document.getElementById('retryBtn').addEventListener('click', () => {
  const wod = game ? game.wod : WODS[0];
  startSong(wod);
});
document.getElementById('menuBtn').addEventListener('click', () => {
  renderSongList();
  showScreen('menu');
});

/* ============== 초기화 ============== */
renderLegend();
renderSongList();
renderLevelChip();
showScreen('menu');
</script>
</body>
</html>
